<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1000" viewBox="0 0 1200 1000">
  <defs>
    <style>
      .cab { fill: none; stroke: #d2cfc8; stroke-width: 0.8; opacity: 0.35; }
      .cab-detail { fill: none; stroke: #c8c5bc; stroke-width: 0.5; opacity: 0.28; }
      .leaf-main { fill: none; stroke: #c0bdb5; stroke-width: 0.7; opacity: 0.3; }
      .leaf-vein { fill: none; stroke: #c8c5bc; stroke-width: 0.4; opacity: 0.22; }
      .geo { fill: none; stroke: #ccc9c0; stroke-width: 0.6; opacity: 0.25; }
      .dash { fill: none; stroke: #d0cdc5; stroke-width: 0.5; opacity: 0.2; stroke-dasharray: 4 3; }
    </style>
  </defs>

  <!-- ==================== CABINET 1: Isometric double-door base (top-left) ==================== -->
  <g transform="translate(80, 60)">
    <!-- Front face -->
    <rect x="0" y="20" width="100" height="120" class="cab"/>
    <!-- Top face - isometric -->
    <polygon points="0,20 30,-2 130,-2 100,20" class="cab"/>
    <!-- Right face - isometric -->
    <polygon points="100,20 130,-2 130,118 100,140" class="cab"/>
    <!-- Door split -->
    <line x1="50" y1="20" x2="50" y2="140" class="cab-detail"/>
    <!-- Top mid line on top face -->
    <line x1="0,20" y1="" x2="" y2="" class="cab-detail"/>
    <!-- Panel insets on doors -->
    <rect x="6" y="28" width="38" height="104" rx="1" class="cab-detail"/>
    <rect x="56" y="28" width="38" height="104" rx="1" class="cab-detail"/>
    <!-- Door handles -->
    <line x1="40" y1="72" x2="40" y2="88" class="cab" stroke-linecap="round"/>
    <line x1="60" y1="72" x2="60" y2="88" class="cab" stroke-linecap="round"/>
    <!-- Legs -->
    <rect x="6" y="140" width="6" height="14" class="cab-detail"/>
    <rect x="88" y="140" width="6" height="14" class="cab-detail"/>
    <!-- Counter top overhang -->
    <line x1="-4" y1="18" x2="104" y2="18" class="cab"/>
    <polygon points="-4,18 26,-4 134,-4 104,18" class="cab-detail"/>
  </g>

  <!-- ==================== MAPLE LEAF 1: Detailed (top-center-right) ==================== -->
  <g transform="translate(900, 80) rotate(12) scale(1.1)">
    <!-- Leaf outline - 7-pointed maple -->
    <path d="M0,-40 C3,-32 8,-28 14,-20 C18,-24 24,-28 22,-18 C28,-16 34,-12 28,-8 C32,-4 34,2 26,2 C28,8 24,14 18,10 C16,16 10,22 6,16 C2,22 -2,22 -6,16 C-10,22 -16,16 -18,10 C-24,14 -28,8 -26,2 C-34,2 -32,-4 -28,-8 C-34,-12 -28,-16 -22,-18 C-24,-28 -18,-24 -14,-20 C-8,-28 -3,-32 0,-40Z" class="leaf-main"/>
    <!-- Stem -->
    <path d="M0,16 C1,22 0,30 -2,40" class="leaf-main" stroke-linecap="round"/>
    <!-- Central vein -->
    <line x1="0" y1="-36" x2="0" y2="16" class="leaf-vein"/>
    <!-- Side veins -->
    <line x1="0" y1="-20" x2="16" y2="-22" class="leaf-vein"/>
    <line x1="0" y1="-20" x2="-16" y2="-22" class="leaf-vein"/>
    <line x1="0" y1="-8" x2="26" y2="-10" class="leaf-vein"/>
    <line x1="0" y1="-8" x2="-26" y2="-10" class="leaf-vein"/>
    <line x1="0" y1="4" x2="20" y2="8" class="leaf-vein"/>
    <line x1="0" y1="4" x2="-20" y2="8" class="leaf-vein"/>
  </g>

  <!-- ==================== Geometric ornament (top center) ==================== -->
  <g transform="translate(500, 70)">
    <!-- Crossed lines with diamond -->
    <line x1="-30" y1="0" x2="30" y2="0" class="geo"/>
    <line x1="0" y1="-30" x2="0" y2="30" class="geo"/>
    <rect x="-12" y="-12" width="24" height="24" transform="rotate(45)" class="geo"/>
    <circle cx="0" cy="0" r="5" class="geo"/>
    <!-- Corner ticks -->
    <line x1="-22" y1="-22" x2="-16" y2="-16" class="geo"/>
    <line x1="22" y1="-22" x2="16" y2="-16" class="geo"/>
    <line x1="-22" y1="22" x2="-16" y2="16" class="geo"/>
    <line x1="22" y1="22" x2="16" y2="16" class="geo"/>
  </g>

  <!-- ==================== Diagonal hatch lines (top-right) ==================== -->
  <g transform="translate(350, 30)">
    <line x1="0" y1="0" x2="50" y2="-50" class="dash"/>
    <line x1="8" y1="0" x2="58" y2="-50" class="dash"/>
    <line x1="16" y1="0" x2="66" y2="-50" class="dash"/>
  </g>

  <!-- ==================== CABINET 2: Drawer stack isometric (right) ==================== -->
  <g transform="translate(820, 280)">
    <!-- Front face -->
    <rect x="0" y="20" width="110" height="130" class="cab"/>
    <!-- Top face -->
    <polygon points="0,20 25,-2 135,-2 110,20" class="cab"/>
    <!-- Right face -->
    <polygon points="110,20 135,-2 135,128 110,150" class="cab"/>
    <!-- 4 drawer lines -->
    <line x1="0" y1="52" x2="110" y2="52" class="cab-detail"/>
    <line x1="0" y1="84" x2="110" y2="84" class="cab-detail"/>
    <line x1="0" y1="116" x2="110" y2="116" class="cab-detail"/>
    <!-- Drawer handles (horizontal bars) -->
    <line x1="38" y1="34" x2="72" y2="34" class="cab" stroke-linecap="round"/>
    <line x1="38" y1="66" x2="72" y2="66" class="cab" stroke-linecap="round"/>
    <line x1="38" y1="98" x2="72" y2="98" class="cab" stroke-linecap="round"/>
    <line x1="38" y1="132" x2="72" y2="132" class="cab" stroke-linecap="round"/>
    <!-- Drawer fronts - inset panels -->
    <rect x="4" y="24" width="102" height="24" rx="1" class="cab-detail"/>
    <rect x="4" y="56" width="102" height="24" rx="1" class="cab-detail"/>
    <rect x="4" y="88" width="102" height="24" rx="1" class="cab-detail"/>
    <rect x="4" y="120" width="102" height="26" rx="1" class="cab-detail"/>
    <!-- Legs -->
    <rect x="8" y="150" width="5" height="12" class="cab-detail"/>
    <rect x="97" y="150" width="5" height="12" class="cab-detail"/>
    <!-- Right-side lines on isometric face -->
    <line x1="110" y1="52" x2="135" y2="30" class="cab-detail"/>
    <line x1="110" y1="84" x2="135" y2="62" class="cab-detail"/>
    <line x1="110" y1="116" x2="135" y2="94" class="cab-detail"/>
  </g>

  <!-- ==================== CABINET 3: Wall cabinet with glass (left-mid) ==================== -->
  <g transform="translate(40, 380)">
    <!-- Outer frame -->
    <rect x="0" y="0" width="120" height="80" class="cab"/>
    <!-- Double doors -->
    <line x1="60" y1="0" x2="60" y2="80" class="cab-detail"/>
    <!-- Glass panel insets (mullion pattern) -->
    <rect x="5" y="5" width="50" height="70" class="cab-detail"/>
    <rect x="65" y="5" width="50" height="70" class="cab-detail"/>
    <!-- Mullion cross on left door -->
    <line x1="30" y1="5" x2="30" y2="75" class="cab-detail"/>
    <line x1="5" y1="40" x2="55" y2="40" class="cab-detail"/>
    <!-- Mullion cross on right door -->
    <line x1="90" y1="5" x2="90" y2="75" class="cab-detail"/>
    <line x1="65" y1="40" x2="115" y2="40" class="cab-detail"/>
    <!-- Handles -->
    <line x1="52" y1="35" x2="52" y2="45" class="cab" stroke-linecap="round"/>
    <line x1="68" y1="35" x2="68" y2="45" class="cab" stroke-linecap="round"/>
    <!-- Crown moulding top -->
    <rect x="-4" y="-6" width="128" height="6" class="cab-detail"/>
    <line x1="-6" y1="-8" x2="126" y2="-8" class="cab-detail"/>
    <!-- Bottom rail -->
    <rect x="-2" y="80" width="124" height="4" class="cab-detail"/>
  </g>

  <!-- ==================== MAPLE LEAF 2: Small (center) ==================== -->
  <g transform="translate(450, 430) rotate(-25) scale(0.7)">
    <path d="M0,-40 C3,-32 8,-28 14,-20 C18,-24 24,-28 22,-18 C28,-16 34,-12 28,-8 C32,-4 34,2 26,2 C28,8 24,14 18,10 C16,16 10,22 6,16 C2,22 -2,22 -6,16 C-10,22 -16,16 -18,10 C-24,14 -28,8 -26,2 C-34,2 -32,-4 -28,-8 C-34,-12 -28,-16 -22,-18 C-24,-28 -18,-24 -14,-20 C-8,-28 -3,-32 0,-40Z" class="leaf-main"/>
    <path d="M0,16 C1,22 0,30 -2,40" class="leaf-main" stroke-linecap="round"/>
    <line x1="0" y1="-36" x2="0" y2="16" class="leaf-vein"/>
    <line x1="0" y1="-8" x2="22" y2="-10" class="leaf-vein"/>
    <line x1="0" y1="-8" x2="-22" y2="-10" class="leaf-vein"/>
    <line x1="0" y1="4" x2="16" y2="8" class="leaf-vein"/>
    <line x1="0" y1="4" x2="-16" y2="8" class="leaf-vein"/>
  </g>

  <!-- ==================== Diagonal hatch lines (mid-left) ==================== -->
  <g transform="translate(230, 260)">
    <line x1="0" y1="0" x2="45" y2="-45" class="dash"/>
    <line x1="8" y1="0" x2="53" y2="-45" class="dash"/>
  </g>

  <!-- ==================== CABINET 4: Tall pantry isometric (center) ==================== -->
  <g transform="translate(380, 550)">
    <!-- Front face -->
    <rect x="0" y="20" width="80" height="200" class="cab"/>
    <!-- Top face -->
    <polygon points="0,20 22,0 102,0 80,20" class="cab"/>
    <!-- Right face -->
    <polygon points="80,20 102,0 102,180 80,220" class="cab"/>
    <!-- Upper door -->
    <rect x="4" y="26" width="72" height="92" rx="1" class="cab-detail"/>
    <!-- Lower door -->
    <rect x="4" y="124" width="72" height="90" rx="1" class="cab-detail"/>
    <!-- Door split line -->
    <line x1="0" y1="120" x2="80" y2="120" class="cab"/>
    <!-- Panel insets -->
    <rect x="10" y="32" width="60" height="80" rx="1" class="cab-detail"/>
    <rect x="10" y="130" width="60" height="78" rx="1" class="cab-detail"/>
    <!-- Handles -->
    <line x1="40" y1="66" x2="40" y2="78" class="cab" stroke-linecap="round"/>
    <line x1="40" y1="164" x2="40" y2="176" class="cab" stroke-linecap="round"/>
    <!-- Right face door lines -->
    <line x1="80" y1="120" x2="102" y2="100" class="cab-detail"/>
    <!-- Legs -->
    <rect x="5" y="220" width="5" height="14" class="cab-detail"/>
    <rect x="70" y="220" width="5" height="14" class="cab-detail"/>
    <!-- Crown -->
    <line x1="-3" y1="18" x2="83" y2="18" class="cab"/>
  </g>

  <!-- ==================== Geometric ornament 2 (right-center) ==================== -->
  <g transform="translate(1050, 500)">
    <line x1="-25" y1="0" x2="25" y2="0" class="geo"/>
    <line x1="0" y1="-25" x2="0" y2="25" class="geo"/>
    <line x1="-18" y1="-18" x2="18" y2="18" class="geo"/>
    <line x1="18" y1="-18" x2="-18" y2="18" class="geo"/>
    <circle cx="0" cy="0" r="10" class="geo"/>
    <circle cx="0" cy="0" r="4" class="geo"/>
  </g>

  <!-- ==================== CABINET 5: Open-door sink base (bottom-left) ==================== -->
  <g transform="translate(60, 720)">
    <!-- Main body -->
    <rect x="0" y="0" width="130" height="100" class="cab"/>
    <!-- Shelf -->
    <line x1="0" y1="50" x2="60" y2="50" class="cab-detail"/>
    <!-- Left door closed -->
    <rect x="3" y="3" width="55" height="94" class="cab-detail"/>
    <rect x="8" y="8" width="45" height="84" rx="1" class="cab-detail"/>
    <!-- Right door open (perspective) -->
    <line x1="62" y1="0" x2="62" y2="100" class="cab-detail"/>
    <line x1="62" y1="0" x2="90" y2="-14" class="cab"/>
    <line x1="62" y1="100" x2="90" y2="86" class="cab"/>
    <line x1="90" y1="-14" x2="90" y2="86" class="cab"/>
    <!-- Panel on open door -->
    <rect x="66" y="-8" width="20" height="88" rx="1" class="cab-detail"/>
    <!-- Handle on closed door -->
    <line x1="54" y1="44" x2="54" y2="56" class="cab" stroke-linecap="round"/>
    <!-- Interior shelf visible -->
    <line x1="62" y1="50" x2="130" y2="50" class="cab-detail"/>
    <!-- Legs -->
    <rect x="5" y="100" width="5" height="12" class="cab-detail"/>
    <rect x="120" y="100" width="5" height="12" class="cab-detail"/>
    <!-- Counter -->
    <line x1="-4" y1="-2" x2="134" y2="-2" class="cab"/>
  </g>

  <!-- ==================== MAPLE LEAF 3: Large (bottom-right) ==================== -->
  <g transform="translate(1020, 760) rotate(20) scale(1.2)">
    <path d="M0,-40 C3,-32 8,-28 14,-20 C18,-24 24,-28 22,-18 C28,-16 34,-12 28,-8 C32,-4 34,2 26,2 C28,8 24,14 18,10 C16,16 10,22 6,16 C2,22 -2,22 -6,16 C-10,22 -16,16 -18,10 C-24,14 -28,8 -26,2 C-34,2 -32,-4 -28,-8 C-34,-12 -28,-16 -22,-18 C-24,-28 -18,-24 -14,-20 C-8,-28 -3,-32 0,-40Z" class="leaf-main"/>
    <path d="M0,16 C1,22 0,34 -3,48" class="leaf-main" stroke-linecap="round"/>
    <line x1="0" y1="-36" x2="0" y2="16" class="leaf-vein"/>
    <line x1="0" y1="-24" x2="14" y2="-22" class="leaf-vein"/>
    <line x1="0" y1="-24" x2="-14" y2="-22" class="leaf-vein"/>
    <line x1="0" y1="-8" x2="26" y2="-10" class="leaf-vein"/>
    <line x1="0" y1="-8" x2="-26" y2="-10" class="leaf-vein"/>
    <line x1="0" y1="4" x2="20" y2="10" class="leaf-vein"/>
    <line x1="0" y1="4" x2="-20" y2="10" class="leaf-vein"/>
    <!-- Secondary veins -->
    <line x1="10" y1="-14" x2="20" y2="-18" class="leaf-vein"/>
    <line x1="-10" y1="-14" x2="-20" y2="-18" class="leaf-vein"/>
    <line x1="14" y1="-4" x2="24" y2="-6" class="leaf-vein"/>
    <line x1="-14" y1="-4" x2="-24" y2="-6" class="leaf-vein"/>
  </g>

  <!-- ==================== CABINET 6: Corner cabinet top-down view (bottom-center) ==================== -->
  <g transform="translate(650, 700)">
    <!-- L-shaped plan view -->
    <path d="M0,0 L100,0 L100,40 L40,40 L40,100 L0,100 Z" class="cab"/>
    <!-- Inner edge -->
    <path d="M4,4 L96,4 L96,36 L36,36 L36,96 L4,96 Z" class="cab-detail"/>
    <!-- Diagonal corner line -->
    <line x1="40" y1="0" x2="100" y2="40" class="cab-detail"/>
    <!-- Door swing arc -->
    <path d="M40,40 Q70,40 100,40" class="cab-detail"/>
    <!-- Handle dot -->
    <circle cx="70" cy="20" r="2" class="cab"/>
    <circle cx="20" cy="70" r="2" class="cab"/>
  </g>

  <!-- ==================== Diagonal hatch (bottom-right) ==================== -->
  <g transform="translate(1100, 650)">
    <line x1="0" y1="0" x2="40" y2="-40" class="dash"/>
    <line x1="8" y1="0" x2="48" y2="-40" class="dash"/>
    <line x1="16" y1="0" x2="56" y2="-40" class="dash"/>
  </g>

  <!-- ==================== Geometric ornament 3 (mid-left) ==================== -->
  <g transform="translate(260, 520)">
    <rect x="-16" y="-16" width="32" height="32" transform="rotate(45)" class="geo"/>
    <rect x="-9" y="-9" width="18" height="18" transform="rotate(45)" class="geo"/>
    <circle cx="0" cy="0" r="3" class="geo"/>
  </g>

  <!-- ==================== Diagonal hatch (center-right) ==================== -->
  <g transform="translate(730, 160)">
    <line x1="0" y1="0" x2="40" y2="-40" class="dash"/>
    <line x1="8" y1="0" x2="48" y2="-40" class="dash"/>
  </g>

  <!-- ==================== MAPLE LEAF 4: Tiny (mid area) ==================== -->
  <g transform="translate(660, 560) rotate(-40) scale(0.45)">
    <path d="M0,-40 C3,-32 8,-28 14,-20 C18,-24 24,-28 22,-18 C28,-16 34,-12 28,-8 C32,-4 34,2 26,2 C28,8 24,14 18,10 C16,16 10,22 6,16 C2,22 -2,22 -6,16 C-10,22 -16,16 -18,10 C-24,14 -28,8 -26,2 C-34,2 -32,-4 -28,-8 C-34,-12 -28,-16 -22,-18 C-24,-28 -18,-24 -14,-20 C-8,-28 -3,-32 0,-40Z" class="leaf-main"/>
    <path d="M0,16 C0,22 -1,30 -2,38" class="leaf-main" stroke-linecap="round"/>
    <line x1="0" y1="-32" x2="0" y2="16" class="leaf-vein"/>
  </g>

  <!-- ==================== Cross accent (scattered) ==================== -->
  <g transform="translate(1120, 120)">
    <line x1="-14" y1="-14" x2="14" y2="14" class="geo"/>
    <line x1="14" y1="-14" x2="-14" y2="14" class="geo"/>
  </g>

  <g transform="translate(200, 150)">
    <line x1="-10" y1="0" x2="10" y2="0" class="geo"/>
    <line x1="0" y1="-10" x2="0" y2="10" class="geo"/>
  </g>

</svg>
